name: Build, Test & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Deploy app
        run: bash deploy1.sh

      - name: Run tests
        run: echo "Skipping tests"